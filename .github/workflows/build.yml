name: Build & Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      build_type:
        type: choice
        description: "Build type"
        required: true
        default: release
        options:
          - debug
          - release
      flavor:
        type: choice
        description: "Product flavor"
        required: true
        default: fdroid
        options:
          - fdroid
          - standalone

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SIGNING_KEY_ALIAS: my-key
      SIGNING_KEY_PASSWORD: mypassword
      SIGNING_STORE_PASSWORD: mypassword

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Keystore
        run: |
          mkdir -p ${{ github.workspace }}/app/keystore/
          keytool -genkeypair \
            -alias my-key \
            -keypass mypassword \
            -keystore ${{ github.workspace }}/app/keystore/android_keystore.jks \
            -storepass mypassword \
            -dname "CN=Phoenix, O=Phoenix, C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 9125

      - name: Build APK
        env:
          KEY_STORE_PATH: ${{ github.workspace }}/app/keystore/android_keystore.jks
        run: |
          flavor="${{ inputs.flavor }}"
          flavor_cap="${flavor^}"
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew :app:assemble${flavor_cap}Release --no-daemon
          else
            ./gradlew :app:assemble${flavor_cap}Debug --no-daemon
          fi

      - name: Rename APKs
        run: |
          APK_DIR="app/build/outputs/apk/${{ inputs.flavor }}/${{ inputs.build_type }}"
          find "$APK_DIR" -name "*arm64*.apk" -exec mv {} "$APK_DIR/Phoenix-Tunnel-arm64.apk" \;
          find "$APK_DIR" -name "*v7*.apk" -exec mv {} "$APK_DIR/Phoenix-Tunnel-armv7.apk" \;

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "ဖီးနစ် VPN #${{ github.run_number }}"
          files: app/build/outputs/apk/${{ inputs.flavor }}/${{ inputs.build_type }}/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
